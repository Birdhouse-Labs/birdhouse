name: CI Checks

on:
  pull_request:
    branches:
      - '**'

jobs:
  frontend-typecheck:
    name: Frontend TypeCheck
    runs-on: macos-latest
    defaults:
      run:
        working-directory: projects/birdhouse
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: |
          bun install --frozen-lockfile
          cd frontend && bun install --frozen-lockfile
          cd ../server && bun install --frozen-lockfile

      - name: Run TypeCheck
        run: cd frontend && bun run typecheck

  frontend-lint:
    name: Frontend Lint
    runs-on: macos-latest
    defaults:
      run:
        working-directory: projects/birdhouse
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: |
          bun install --frozen-lockfile
          cd frontend && bun install --frozen-lockfile

      - name: Run Lint
        run: cd frontend && bun run lint

  frontend-css-lint:
    name: Frontend CSS Lint
    runs-on: macos-latest
    defaults:
      run:
        working-directory: projects/birdhouse
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: |
          bun install --frozen-lockfile
          cd frontend && bun install --frozen-lockfile

      - name: Run CSS Lint
        run: cd frontend && bun run lint:css

  frontend-test:
    name: Frontend Test
    runs-on: macos-latest
    defaults:
      run:
        working-directory: projects/birdhouse
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: |
          bun install --frozen-lockfile
          cd frontend && bun install --frozen-lockfile

      - name: Run Tests
        run: cd frontend && bun run test

  frontend-build:
    name: Frontend Build
    runs-on: macos-latest
    defaults:
      run:
        working-directory: projects/birdhouse
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: |
          bun install --frozen-lockfile
          cd frontend && bun install --frozen-lockfile

      - name: Generate and validate themes
        run: cd frontend && bun run generate:themes && bun run validate:themes

      - name: Run Build
        run: cd frontend && bun run build

  server-typecheck:
    name: Server TypeCheck
    runs-on: macos-latest
    defaults:
      run:
        working-directory: projects/birdhouse
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: |
          bun install --frozen-lockfile
          cd server && bun install --frozen-lockfile

      - name: Run TypeCheck
        run: cd server && bun run typecheck

  server-lint:
    name: Server Lint
    runs-on: macos-latest
    defaults:
      run:
        working-directory: projects/birdhouse
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: |
          bun install --frozen-lockfile
          cd server && bun install --frozen-lockfile

      - name: Run Lint
        run: cd server && bun run lint

  server-test:
    name: Server Test
    runs-on: macos-latest
    defaults:
      run:
        working-directory: projects/birdhouse
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: |
          bun install --frozen-lockfile
          cd server && bun install --frozen-lockfile

      - name: Run Tests
        run: cd server && bun test

  server-build:
    name: Server Build
    runs-on: macos-latest
    defaults:
      run:
        working-directory: projects/birdhouse
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: |
          bun install --frozen-lockfile
          cd server && bun install --frozen-lockfile

      - name: Run Build
        run: cd server && bun run build

  plugin-typecheck:
    name: Plugin TypeCheck
    runs-on: macos-latest
    defaults:
      run:
        working-directory: projects/birdhouse-oc-plugin
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run TypeCheck
        run: bun run typecheck

  plugin-test:
    name: Plugin Test
    runs-on: macos-latest
    defaults:
      run:
        working-directory: projects/birdhouse-oc-plugin
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run Tests
        run: bun test

  plugin-build:
    name: Plugin Build
    runs-on: macos-latest
    defaults:
      run:
        working-directory: projects/birdhouse-oc-plugin
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run Build
        run: bun run build
