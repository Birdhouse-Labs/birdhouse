name: Bug Report
description: Something isn't working correctly
labels: ["type: bug", "needs triage"]
body:
  - type: markdown
    attributes:
      value: |
        Before filing a bug, please check if there's already an open issue for this.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: How can we reliably reproduce this?
      placeholder: |
        1. Start Birdhouse with `birdhouse ui`
        2. Create an agent with...
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: input
    id: birdhouse-version
    attributes:
      label: Birdhouse version
      placeholder: "birdhouse --version"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or error output
      description: Paste any relevant console output here.
      render: shell
